name: demo
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.10.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  firebase_core: ^2.32.0
  firebase_auth: ^4.8.0
  cloud_firestore: ^4.17.5
  url_launcher: ^6.2.1
  http: ^1.1.0

  # Các phiên bản đã được hạ cấp để tương thích hoàn toàn với Dart 3.10.0
  google_sign_in: ^6.1.6
  googleapis: ^11.4.0
  googleapis_auth: ^2.1.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Hạ cấp lints để không bị xung đột với SDK cũ
  flutter_lints: ^2.0.3

flutter:
  uses-material-design: true